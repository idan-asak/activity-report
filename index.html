<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動報告</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        .container { width: 100%; max-width: 400px; margin-top: 10px; }
        .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .section-title {
            font-size: 15px; font-weight: 700; color: #333; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .section-title .icon { font-size: 20px; }
        .activity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .activity-btn {
            padding: 10px 8px; border: 2px solid #e0e0e0; border-radius: 10px; background: #fafafa;
            font-size: 14px; color: #555; cursor: pointer; text-align: center; transition: all 0.2s; user-select: none;
        }
        .activity-btn.selected { border-color: #667eea; background: #f0f2ff; color: #667eea; font-weight: 600; }
        .custom-item {
            padding: 10px 8px; border: 2px solid #e0e0e0; border-radius: 10px; background: #fafafa;
            font-size: 14px; color: #555; cursor: pointer; text-align: center; transition: all 0.2s; user-select: none;
            grid-column: span 2;
        }
        .custom-item.selected { border-color: #667eea; background: #f0f2ff; color: #667eea; font-weight: 600; }
        .detail-input {
            width: 100%; padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 14px; color: #333; background: #fafafa; margin-top: 12px; resize: none;
        }
        .detail-input:focus { outline: none; border-color: #667eea; background: white; }
        .hint { font-size: 11px; color: #999; margin-top: 4px; }
        .btn-submit {
            width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); letter-spacing: 1px;
        }
        .btn-submit:active { opacity: 0.8; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-sns {
            width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
            cursor: pointer; margin-bottom: 8px;
        }
        .btn-x { background: #000; color: white; }
        .btn-skip { background: #f0f0f0; color: #666; }
        .loading { text-align: center; padding: 60px 20px; color: white; font-size: 16px; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .success-msg { text-align: center; padding: 30px 20px; }
        .success-msg .icon { font-size: 48px; margin-bottom: 12px; }
        .success-msg p { color: #333; font-size: 16px; line-height: 1.6; }
        .error-msg { text-align: center; padding: 40px 20px; }
        .error-msg p { color: #666; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>読み込み中...</p>
        </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const LIFF_ID = "2006372055-O1K6qyZd";
        const API_BASE = "https://api.asa-plant.com";

        const ACTIVITIES = [
            { id: "読書", label: "📖 読書" },
            { id: "勉強", label: "💻 勉強" },
            { id: "運動", label: "💪 運動" },
            { id: "副業", label: "✍️ 副業" },
            { id: "創作", label: "🎨 創作" },
            { id: "仕事", label: "💼 仕事" },
        ];

        let lineUserId = null;
        let userProfile = null;
        let isInClient = false;

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                isInClient = liff.isInClient();

                if (!liff.isLoggedIn() && !isInClient) {
                    showPcMode();
                    return;
                }

                const profile = await liff.getProfile();
                lineUserId = profile.userId;

                // プロフィール取得
                try {
                    const resp = await fetch(`${API_BASE}/api/profile?line_user_id=${lineUserId}`);
                    if (resp.ok) {
                        const data = await resp.json();
                        if (data.found) userProfile = data;
                    }
                } catch (e) {}

                renderReportForm();
            } catch (e) {
                showPcMode();
            }
        }

        function showPcMode() {
            document.getElementById("app").innerHTML = `
                <div class="card">
                    <div class="error-msg">
                        <p>コミュニティへの報告はLINEアプリから開いてください</p>
                    </div>
                </div>`;
        }

        function renderReportForm() {
            const app = document.getElementById("app");

            // プロフィールからデフォルト選択を決定
            const profileActivities = userProfile && userProfile.activities
                ? userProfile.activities.split(",").map(s => s.trim()).filter(s => s) : [];
            const profileFreeItems = userProfile && userProfile.free_text
                ? userProfile.free_text.split(",").map(s => s.trim()).filter(s => s) : [];

            // 活動ボタン（プロフィール設定済みのものをデフォルトON）
            let activityBtns = "";
            ACTIVITIES.forEach(a => {
                const sel = profileActivities.includes(a.id) ? "selected" : "";
                activityBtns += `<div class="activity-btn ${sel}" data-id="${a.id}" onclick="toggleBtn(this)">${a.label}</div>`;
            });

            // カスタム活動（free_text）
            let customBtns = "";
            profileFreeItems.forEach(item => {
                customBtns += `<div class="custom-item selected" data-id="${item}" onclick="toggleBtn(this)">${item}</div>`;
            });

            app.innerHTML = `
                <div class="card">
                    <div class="section-title"><span class="icon">📝</span> 今日の活動報告</div>
                    <p style="font-size:13px; color:#666; margin-bottom:12px;">やったことをタップしてください</p>
                    <div class="activity-grid" id="activityGrid">
                        ${activityBtns}
                        ${customBtns}
                    </div>
                    <textarea class="detail-input" id="detail" rows="2"
                              placeholder="詳しく書く（任意）"></textarea>
                    <p class="hint">報告後にXにもシェアできます</p>
                </div>
                <button class="btn-submit" id="submitBtn" onclick="submitReport()">報告する</button>
            `;
        }

        function toggleBtn(el) {
            el.classList.toggle("selected");
        }

        function getSelectedItems() {
            return Array.from(document.querySelectorAll(".activity-btn.selected, .custom-item.selected")).map(b => b.dataset.id);
        }

        async function submitReport() {
            const items = getSelectedItems();
            const detail = document.getElementById("detail").value.trim();

            if (items.length === 0 && !detail) {
                alert("やったことを選択するか、詳しく書くに入力してください");
                return;
            }

            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.textContent = "送信中...";

            // メッセージ組み立て
            let msg = "【今日の積み上げ】\n";
            if (items.length > 0) {
                msg += items.map(i => " ・" + i).join("\n");
            }
            if (detail) {
                msg += "\n\n" + detail;
            }

            try {
                await liff.sendMessages([{ type: "text", text: msg }]);
                showSnsStep(items, detail);
            } catch (e) {
                btn.disabled = false;
                btn.textContent = "報告する";
                alert("送信に失敗しました: " + e.message);
            }
        }

        function showSnsStep(items, detail) {
            const app = document.getElementById("app");
            app.innerHTML = `
                <div class="card">
                    <div class="success-msg">
                        <div class="icon">✅</div>
                        <p>コミュニティに報告しました！</p>
                        <p style="font-size:13px; color:#888; margin-top:8px;">SNSにもシェアしませんか？</p>
                    </div>
                    <button class="btn-sns btn-x" onclick="shareX()">X（Twitter）にポスト</button>
                    <button class="btn-sns btn-skip" onclick="closeApp()">閉じる</button>
                </div>`;

            // データを保存（Xシェア用）
            window._reportItems = items;
            window._reportDetail = detail;
        }

        function shareX() {
            const items = window._reportItems || [];
            const detail = window._reportDetail || "";

            let text = "#今日の積み上げ\n\n";
            if (items.length > 0) {
                text += items.map(i => "・" + i).join("\n");
            }
            if (detail) {
                text += "\n\n" + detail;
            }
            text += "\n\n#朝活 #朝活プラント";

            const url = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(text)
                + "&url=" + encodeURIComponent("https://asa-plant.com/community-lp/");
            window.open(url, "_blank");
        }

        function closeApp() {
            if (isInClient) {
                liff.closeWindow();
            } else {
                window.close();
            }
        }

        function showError(msg) {
            document.getElementById("app").innerHTML = `<div class="card"><div class="error-msg"><p>${msg}</p></div></div>`;
        }

        init();
    </script>
</body>
</html>
